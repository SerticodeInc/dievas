# Railway deployment config for dievas_landing (Jaspr server).
#
# Railway auto-deploys on push to the branch linked in the Railway dashboard.
# The build context is the repo root so the Dockerfile can reach both
# landing/ and packages/dievas_tokens/.

[build]
builder          = "DOCKERFILE"
dockerfilePath   = "landing/Dockerfile"
buildContext     = "."

[deploy]
startCommand     = "JASPR_PORT=${PORT:-8080} ./app"
healthcheckPath  = "/"
healthcheckTimeout = 30
restartPolicyType  = "ON_FAILURE"
