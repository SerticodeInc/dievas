          interval: weekly
          day: monday
      commit-message:
          prefix: "chore(deps)"

    - package-ecosystem: pub
      directory: /packages/dievas_gallery
      schedule:
          interval: weekly
          day: monday
      commit-message:
          prefix: "chore(deps)"

    - package-ecosystem: pub
      directory: /packages/dievas_tokens
      schedule:
          interval: weekly
          day: monday
      commit-message:
          prefix: "chore(deps)"
