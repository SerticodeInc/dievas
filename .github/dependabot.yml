      directory: /
      schedule:
          interval: weekly
          day: monday
      commit-message:
          prefix: "chore(deps)"

    - package-ecosystem: pub
      directory: /
      schedule:
          interval: weekly
          day: monday
      commit-message:
          prefix: "chore(deps)"

    - package-ecosystem: pub
      directory: /packages/dievas
