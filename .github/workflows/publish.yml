name: Publish to pub.dev

# Publishes dievas_tokens (pure Dart) and/or dievas (Flutter) to pub.dev.
# Uses OIDC trusted publishing — no tokens needed.
#
# Prerequisites — one-time setup on pub.dev (per package):
#   Admin tab → Automated publishing → Enable publishing from GitHub Actions
#     - Repository:  Serticode/dievas
#     - Tag pattern: dievas_tokens-v{{version}}  (for dievas_tokens)
#     - Tag pattern: dievas-v{{version}}          (for dievas)
#
# Triggers:
#   Tag → dievas_tokens-v<version> or dievas-v<version>
#
# Note: OIDC only works on tag pushes, NOT workflow_dispatch.
# dievas_tokens must be published before dievas (dievas depends on it).

on:
    push:
        tags:
            - 'dievas_tokens-v*'
            - 'dievas-v*'

jobs:
    analyze-format-test:
        name: Analyze, Format & Test
        uses: ./.github/workflows/ci.yml

    publish-dievas-tokens:
        name: Publish dievas_tokens
        needs: [analyze-format-test]
        if: startsWith(github.ref_name, 'dievas_tokens-v')
        permissions:
            id-token: write
        uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
        with:
            working-directory: packages/dievas_tokens

    publish-dievas:
        name: Publish dievas
        needs: [analyze-format-test]
        if: startsWith(github.ref_name, 'dievas-v')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v7
            - uses: dart-lang/setup-dart@v1
            - uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  cache: true
            - name: Publish (dry run)
              working-directory: packages/dievas
              run: dart pub publish --dry-run
            - name: Publish to pub.dev
              working-directory: packages/dievas
              run: dart pub publish -f
