name: dievas_gallery
description: "Dievas design system — Widget book component gallery."

publish_to: "none"

version: 0.0.1
resolution: workspace

environment:
    sdk: ">=3.11.4 <4.0.0"
    flutter: ">=3.22.0"

dependencies:
    flutter:
        sdk: flutter

    dievas:
        path: ../dievas
    widgetbook: ^3.24.0
    device_frame: ^1.4.0

dev_dependencies:
    flutter_test:
        sdk: flutter

    flutter_lints: ^6.0.0

dependency_overrides:
    # widgetbook ^3.20.2 pulls an older accessibility_tools incompatible
    # with Flutter >= 3.38. Override to the latest compatible version.
    # https://github.com/widgetbook/widgetbook/issues/1733
    accessibility_tools: ^2.8.0

flutter:
    uses-material-design: true
