name: Publish to pub.dev

# Publishes dievas_tokens (pure Dart) and/or dievas (Flutter) to pub.dev.
# Uses trusted publishing (OIDC) so no PUB_DEV_PUBLISH_ACCESS_TOKEN is needed.
#
# Triggers:
#   Manual  → Actions tab → Run workflow → select package
#   Tag     → dievas_tokens-v<version> or dievas-v<version>
#
# Each job has its own GitHub Environment entry for deployment tracking.

on:
    workflow_dispatch:
        inputs:
            package:
                description: Package to publish
                required: true
                type: choice
                options:
                    - dievas_tokens
                    - dievas
                    - both
    push:
        tags:
            - 'dievas_tokens-v*'
            - 'dievas-v*'

jobs:
    analyze-format-test:
        name: Analyze, Format & Test
        uses: ./.github/workflows/ci.yml

    publish-dievas-tokens:
        name: Publish dievas_tokens
        needs: [analyze-format-test]
        if: |
            startsWith(github.ref_name, 'dievas_tokens-v') ||
            (github.event_name == 'workflow_dispatch' &&
             contains(fromJson('["dievas_tokens", "both"]'), github.event.inputs.package))
        runs-on: ubuntu-latest
        environment:
            name: pub.dev-dievas_tokens
            url: https://pub.dev/packages/dievas_tokens
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6
            - uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  cache: true
            - name: Publish to pub.dev
              working-directory: packages/dievas_tokens
              run: dart pub publish --force

    publish-dievas:
        name: Publish dievas
        needs: [analyze-format-test]
        if: |
            startsWith(github.ref_name, 'dievas-v') ||
            (github.event_name == 'workflow_dispatch' &&
             contains(fromJson('["dievas", "both"]'), github.event.inputs.package))
        runs-on: ubuntu-latest
        environment:
            name: pub.dev-dievas
            url: https://pub.dev/packages/dievas
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6
            - uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  cache: true
            - name: Publish to pub.dev
              working-directory: packages/dievas
              run: flutter pub publish --force
