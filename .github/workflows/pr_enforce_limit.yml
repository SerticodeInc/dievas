name: Enforce PR Limit

on:
    pull_request:
        types:
            - opened
            - edited
            - reopened
            - synchronize

jobs:
    enforce-pr-limit:
        if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: read
        steps:
            - uses: Homebrew/actions/limit-pull-requests@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef
              with:
                  comment-limit: 3
                  comment: >
                      You are allowed to have at most 3 pull requests open at a time!
                      Consider getting your existing PRs merged before opening new ones. Thanks!
                  close-limit: 3
                  close: true
